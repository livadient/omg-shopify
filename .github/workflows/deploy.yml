name: Deploy to Azure VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd ~/omg-shopify
            # Protect server-authoritative files from git pull
            [ -f product_mappings.json ] && cp product_mappings.json product_mappings.json.bak
            # Drop any untracked files in tracked dirs (e.g. one-shot scripts
            # scp'd ad-hoc for testing) so they don't block git pull with
            # "untracked working tree files would be overwritten by merge".
            # Without set -e the previous deploy silently 'succeeded' while
            # git pull aborted, leaving the server on stale code.
            git clean -fd scripts/ tests/ app/ doc/ .github/
            git pull origin main
            [ -f product_mappings.json.bak ] && cp product_mappings.json.bak product_mappings.json && rm product_mappings.json.bak
            docker compose down --remove-orphans
            # Prune BEFORE the build, not after. The build itself COPYs
            # the static/ folder (~1GB and growing) and adds another
            # ~4GB of image layers; on a near-full 29GB disk it errors
            # with "no space left on device" and the post-build prune
            # never gets a chance to run. Doing the prune first frees
            # 5-10GB so the build has room to write.
            docker image prune -af
            docker builder prune -af --keep-storage 2g
            docker container prune -f
            docker compose up -d --build
            # Second prune trims the now-dangling previous image so the
            # disk doesn't accumulate after each successful deploy.
            docker image prune -af
            docker builder prune -af --keep-storage 2g
